<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Accordion — Harmonic Bellows</title>
    <style>
        :root {
            --accent: #27ae60;
            --bg: #0a0a0a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: var(--bg);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #fff;
        }

        #video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 0;
            opacity: 0.4;
            filter: grayscale(0.5) contrast(1.2);
        }

        #three-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
            background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.6) 100%);
        }

        .hud-segment {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .title-block h1 {
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .title-block .status {
            font-size: 10px;
            letter-spacing: 0.2em;
            color: var(--accent);
            text-transform: uppercase;
        }

        .metrics {
            text-align: right;
            font-family: 'JetBrains Mono', monospace;
        }

        .metric {
            margin-bottom: 10px;
        }

        .metric-label {
            font-size: 9px;
            opacity: 0.4;
            text-transform: uppercase;
            display: block;
        }

        .metric-value {
            font-size: 18px;
            font-weight: 200;
        }

        #interaction-prompt {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            z-index: 100;
            transition: opacity 0.5s ease;
            text-align: center;
        }

        #interaction-prompt span {
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <div id="interaction-prompt">
        <span>Click to Initialize Audio</span>
    </div>

    <video id="video-bg" autoplay playsinline muted></video>
    <canvas id="three-canvas"></canvas>

    <div id="overlay">
        <div class="hud-segment">
            <div class="title-block">
                <h1>Harmonic Accordion</h1>
                <div class="status" id="status-text">Hand Tracking Active</div>
            </div>
            <div class="metrics">
                <div class="metric">
                    <span class="metric-label">Bellows Distance</span>
                    <span class="metric-value" id="val-dist">0.00</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Note / Pitch</span>
                    <span class="metric-value" id="val-pitch">---</span>
                </div>
            </div>
        </div>
        <div class="hud-segment" style="align-items: flex-end;">
            <div class="metric" style="text-align: left;">
                <span class="metric-label">Pressure</span>
                <span class="metric-value" id="val-pressure">0.0</span>
            </div>
            <div class="metric">
                <span class="metric-label">Hands Detected</span>
                <span class="metric-value" id="val-hands">0</span>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <script>
        /**
         * AUDIO SYSTEM
         * Realistic accordion sound using additive synthesis.
         * Accordion sounds are rich in odd harmonics (similar to square/reed).
         */
        class AccordionSynth {
            constructor() {
                this.ctx = null;
                this.masterGain = null;
                this.oscillators = [];
                this.filters = [];
                this.active = false;
                this.currentFreq = 0;
                this.targetVolume = 0;
                this.currentVolume = 0;
            }

            init() {
                if (this.ctx) return;
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.masterGain = this.ctx.createGain();
                this.masterGain.gain.value = 0;
                
                // Lowpass filter for warmth
                const filter = this.ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 1200;
                filter.Q.value = 1;

                this.masterGain.connect(filter);
                filter.connect(this.ctx.destination);

                // Multiple oscillators for reedy thickness
                // Fundamental + Harmonics
                const partials = [1, 2, 3, 4, 5]; // Rich harmonic series
                const weights = [1.0, 0.4, 0.3, 0.2, 0.1];

                partials.forEach((p, i) => {
                    const osc = this.ctx.createOscillator();
                    osc.type = i % 2 === 0 ? 'square' : 'sawtooth'; // Square is reedy, Saw is bright
                    const g = this.ctx.createGain();
                    g.gain.value = weights[i] * 0.2;
                    osc.connect(g);
                    g.connect(this.masterGain);
                    osc.start();
                    this.oscillators.push({ osc, mult: p, gain: g });
                });

                this.active = true;
            }

            setVolume(v) {
                if (!this.active) return;
                this.targetVolume = Math.max(0, Math.min(0.5, v));
            }

            setFreq(f) {
                if (!this.active) return;
                this.currentFreq = f;
                this.oscillators.forEach(o => {
                    o.osc.frequency.setTargetAtTime(f * o.mult, this.ctx.currentTime, 0.1);
                });
            }

            update() {
                if (!this.active) return;
                // Smooth volume changes (slightly slower for graceful fade)
                this.currentVolume += (this.targetVolume - this.currentVolume) * 0.08;
                this.masterGain.gain.setTargetAtTime(this.currentVolume, this.ctx.currentTime, 0.05);

                // Add subtle organic vibrato
                const time = this.ctx.currentTime;
                const vibrato = Math.sin(time * 12) * 2; // 12Hz vibrato
                const jitter = (Math.random() - 0.5) * this.currentVolume * 1.5;
                
                this.oscillators.forEach(o => {
                    o.osc.frequency.setTargetAtTime(this.currentFreq * o.mult + vibrato + jitter, this.ctx.currentTime, 0.1);
                });
            }
        }

        const synth = new AccordionSynth();
        const prompt = document.getElementById('interaction-prompt');
        prompt.addEventListener('click', () => {
            synth.init();
            prompt.style.opacity = '0';
            setTimeout(() => prompt.remove(), 500);
        });

        /**
         * THREE.JS VISUALS
         * Bellows made of segmented panels.
         */
        let renderer, scene, camera, bellowsGroup, handLine, composer;
        const bellowsPanels = [];
        const NUM_SEGMENTS = 16; // Slightly more for smoothness

        function initThree() {
            const canvas = document.getElementById('three-canvas');
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 12;

            bellowsGroup = new THREE.Group();
            scene.add(bellowsGroup);

            // Hand connection line
            const lineGeo = new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(new Float32Array(6), 3));
            const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
            handLine = new THREE.Line(lineGeo, lineMat);
            scene.add(handLine);

            // Lighting
            const ambient = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambient);
            
            const p1 = new THREE.PointLight(0x27ae60, 2, 20);
            p1.position.set(5, 5, 2);
            scene.add(p1);
            
            const p2 = new THREE.PointLight(0x1e8449, 2, 20);
            p2.position.set(-5, -5, 2);
            scene.add(p2);

            // Create accordion panels (zigzag pattern)
            const panelWidth = 0.8;
            const panelHeight = 5;
            
            for (let i = 0; i < NUM_SEGMENTS; i++) {
                const geo = new THREE.PlaneGeometry(panelWidth, panelHeight, 1, 10); // Added segments for curve
                const mat = new THREE.MeshPhongMaterial({
                    color: i % 2 === 0 ? 0x27ae60 : 0x1e8449,
                    side: THREE.DoubleSide,
                    shininess: 100,
                    flatShading: false
                });
                const mesh = new THREE.Mesh(geo, mat);
                
                const wire = new THREE.LineSegments(
                    new THREE.EdgesGeometry(geo),
                    new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.15, transparent: true })
                );
                mesh.add(wire);

                bellowsGroup.add(mesh);
                bellowsPanels.push(mesh);
            }
        }

        function updateBellows(distance, h1, h2) {
            const totalWidth = distance * 12; 
            const segmentSpacing = totalWidth / NUM_SEGMENTS;
            
            // Map Screen Coords to Three.js (-7 to 7 approx for X, -4 to 4 for Y)
            const x1 = (h1.x - 0.5) * -15;
            const y1 = (0.5 - h1.y) * 10;
            const x2 = (h2.x - 0.5) * -15;
            const y2 = (0.5 - h2.y) * 10;

            // Update hand line
            const pos = handLine.geometry.attributes.position;
            pos.setXYZ(0, x1, y1, 0);
            pos.setXYZ(1, x2, y2, 0);
            pos.needsUpdate = true;
            handLine.visible = true;

            // Center bellows between hands
            bellowsGroup.position.set((x1 + x2) / 2, (y1 + y2) / 2, 0);
            
            // Rotate bellows to align with hand slope
            const angleHands = Math.atan2(y2 - y1, x2 - x1);
            bellowsGroup.rotation.z = angleHands;

            bellowsPanels.forEach((p, i) => {
                const x = (i - (NUM_SEGMENTS - 1) / 2) * segmentSpacing;
                p.position.x = x;
                
                const foldAngle = 0.9 * (i % 2 === 0 ? 1 : -1) * (1.1 - Math.min(1, distance * 1.5));
                p.rotation.y = foldAngle;

                // Subtle curvature based on "pressure"
                const curve = Math.sin(Date.now() * 0.01) * 0.05;
                p.rotation.z = curve * (i / NUM_SEGMENTS);
            });
        }

        /**
         * HAND TRACKING
         * Tracks 2 hands to calculate distance (bellows expansion).
         */
        const video = document.getElementById('video-bg');
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        let smoothedDist = 0;
        let lastDist = 0;

        hands.onResults((results) => {
            const numHands = results.multiHandLandmarks ? results.multiHandLandmarks.length : 0;
            document.getElementById('val-hands').textContent = numHands;

            if (numHands === 2) {
                const h1 = results.multiHandLandmarks[0][9]; // Middle finger MCP (palm center approx)
                const h2 = results.multiHandLandmarks[1][9];
                
                const d = Math.sqrt(
                    Math.pow(h1.x - h2.x, 2) + 
                    Math.pow(h1.y - h2.y, 2)
                );

                smoothedDist += (d - smoothedDist) * 0.2;
                
                // Pressure = speed of change
                const pressure = Math.abs(d - lastDist) * 50;
                lastDist = d;

                // Update UI
                document.getElementById('val-dist').textContent = smoothedDist.toFixed(2);
                document.getElementById('val-pressure').textContent = pressure.toFixed(1);

                // Calculate note based on average vertical position
                const avgY = (h1.y + h2.y) / 2;
                // Map Y (top=0, bottom=1) to musical scale (A2 to A4 approx)
                // Low Y (top) = higher pitch
                const freq = 110 * Math.pow(2, (1 - avgY) * 2); 
                const notes = ["A", "A#", "B", "C", "C#", "D", "D#", "E", "F", "F#", "G", "G#"];
                const semitones = Math.round(12 * Math.log2(freq / 440));
                const noteName = notes[((semitones % 12) + 12) % 12] + (Math.floor((semitones + 9) / 12) + 4);
                
                document.getElementById('val-pitch').textContent = noteName;

                // Update Audio
                synth.setVolume(smoothedDist * 0.4 + pressure * 0.3);
                synth.setFreq(freq);

                // Update Visuals
                updateBellows(smoothedDist, h1, h2);
            } else if (numHands === 1) {
                // Hide hand line if only 1 hand
                if (handLine) handLine.visible = false;
                synth.setVolume(0);
            } else {
                if (handLine) handLine.visible = false;
                synth.setVolume(0);
            }
        });

        const cameraUtils = new Camera(video, {
            onFrame: async () => {
                await hands.send({ image: video });
            },
            width: 1280,
            height: 720
        });

        // Initialize and Loop
        initThree();
        cameraUtils.start();

        function animate() {
            requestAnimationFrame(animate);
            synth.update();
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
